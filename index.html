<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="visualization.js" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <title>Wemby Climate</title>
</head>
<body>
    <main class="page">
        <header class="page-header">
            <h1>Wemby Climate</h1>
            <div id="header-logos" aria-label="NBA team logos">
                <img src="https://a.espncdn.com/i/teamlogos/nba/500/atl.png" alt="Atlanta Hawks logo">
                <img src="https://a.espncdn.com/i/teamlogos/nba/500/bos.png" alt="Boston Celtics logo">
                <img src="https://a.espncdn.com/i/teamlogos/nba/500/bkn.png" alt="Brooklyn Nets logo">
                <img src="https://a.espncdn.com/i/teamlogos/nba/500/cha.png" alt="Charlotte Hornets logo">
            </div>
            <p id="graph-description">
                The line chart compares selected NBA teams across seasons for pace, field goal attempts,
                three-point attempts, and wins, with a dashed league-average trend for context.
                Use the map or team selector to add and remove teams.
            </p>
        </header>

        <div id="controls">
            <select id="team-select" multiple></select>
            <div id="metric-toggle">
                <label><input type="radio" name="metric" value="pace" checked> Pace</label>
                <label><input type="radio" name="metric" value="fga_per_game"> FGA/G</label>
                <label><input type="radio" name="metric" value="x3pa_per_game"> 3PA/G</label>
                <label><input type="radio" name="metric" value="wins"> Wins</label>
            </div>
        </div>

        <section id="dashboard-wrap">
            <div id="team-logos" aria-label="Selected team logos"></div>
            <div id="dashboard">
                <svg id="map"></svg>
                <svg id="chart"></svg>
            </div>
        </section>
    </main>
</body>
</html>
